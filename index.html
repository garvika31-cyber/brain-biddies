<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Brainy Buddies V3</title>

<style>
body{
  margin:0;
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(135deg,#667eea,#764ba2);
  text-align:center;
  color:#fff;
}

.container{
  max-width:520px;
  margin:auto;
  padding:15px;
}

h1{margin:10px 0;}

.panel{
  background:#fff;
  color:#333;
  border-radius:20px;
  padding:20px;
  margin-top:15px;
  box-shadow:0 10px 25px rgba(0,0,0,0.25);
}

.grid{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:10px;
}

.card{
  background:#ffeaa7;
  padding:20px;
  border-radius:15px;
  font-size:28px;
  cursor:pointer;
  transition:.2s;
}

.card.correct{background:#55efc4;}
.card.wrong{background:#ff7675;}

button{
  padding:12px 20px;
  border:none;
  border-radius:12px;
  margin:8px;
  font-size:16px;
  cursor:pointer;
  background:#fdcb6e;
}

.progress{
  font-size:16px;
}

.big{font-size:35px;}

.fade{
  animation:fade .4s ease;
}
@keyframes fade{
  from{opacity:0;transform:scale(.9);}
  to{opacity:1;transform:scale(1);}
}
</style>
</head>

<body>

<div class="container">
<h1>🧠 Brainy Buddies</h1>

<div class="progress">
Stage <span id="stage">1</span>/10 |
⭐ <span id="stars">0</span>
</div>

<div class="panel fade" id="game"></div>

<button onclick="nextStage()">Next ▶</button>

</div>

<script>
let stage=1, stars=0;

// brain metrics
let brain = {
  memory:0,
  logic:0,
  focus:0
};

const emojis=["🐶","🐱","🐸","🐼","🦊","🐵","🐰","🐻"];

function updateUI(){
  stageEl.innerText=stage;
  starsEl.innerText=stars;
}

const stageEl=document.getElementById("stage");
const starsEl=document.getElementById("stars");
const game=document.getElementById("game");

// ---------- MEMORY ----------
function memoryGame(){
  let pairs=2+Math.floor(stage/2);
  let set=emojis.slice(0,pairs);
  let deck=[...set,...set].sort(()=>Math.random()-0.5);

  let first=null;

  game.innerHTML="<h3>Memory Match</h3><div class='grid'></div>";
  let grid=game.querySelector(".grid");

  deck.forEach(val=>{
    let div=document.createElement("div");
    div.className="card";
    div.innerText="❓";

    div.onclick=()=>{
      if(div.innerText!=="❓")return;

      div.innerText=val;

      if(!first){
        first={div,val};
      } else {
        if(first.val===val){
          stars++;
          brain.memory++;
          div.classList.add("correct");
          first.div.classList.add("correct");
        } else {
          brain.focus--;
          setTimeout(()=>{
            div.innerText="❓";
            first.div.innerText="❓";
          },500);
        }
        first=null;
        updateUI();
      }
    };

    grid.appendChild(div);
  });
}

// ---------- PATTERN ----------
function patternGame(){
  let seq=[];
  for(let i=0;i<3+stage;i++){
    seq.push(emojis[i%3]);
  }

  let ans=seq[seq.length-3];

  let html="<h3>Pattern Logic</h3><div class='big'>";
  seq.forEach(e=>html+=e+" ");
  html+="❓</div>";

  let opts=[ans,emojis[4],emojis[5]].sort(()=>Math.random()-0.5);

  opts.forEach(o=>{
    html+=`<button onclick="checkPattern('${o}','${ans}')">${o}</button>`;
  });

  game.innerHTML=html;
}

function checkPattern(sel,ans){
  if(sel===ans){
    stars+=2;
    brain.logic++;
    alert("🎉 Correct!");
  } else {
    brain.focus--;
    alert("Oops!");
  }
  updateUI();
}

// ---------- SORT ----------
function sortGame(){
  let items=["🐶","🍎","🐱","🍌","🐸","🍇"]
    .sort(()=>Math.random()-0.5)
    .slice(0,3+stage);

  let html="<h3>Sorting Game</h3>";
  items.forEach(i=>{
    html+=`<button onclick="selectItem('${i}')">${i}</button>`;
  });

  html+="<br><br>";
  html+=`<button onclick="drop('animal')">🐾</button>`;
  html+=`<button onclick="drop('fruit')">🍓</button>`;

  game.innerHTML=html;
  window.selected=null;
}

function selectItem(i){
  window.selected=i;
}

function drop(type){
  if(!window.selected)return;

  let animals=["🐶","🐱","🐸"];
  let fruits=["🍎","🍌","🍇"];

  let correct=(type==="animal" && animals.includes(selected)) ||
              (type==="fruit" && fruits.includes(selected));

  if(correct){
    stars++;
    brain.logic++;
    alert("Good job!");
  } else {
    brain.focus--;
    alert("Try again!");
  }

  updateUI();
}

// ---------- REPORT ----------
function report(){
  let msg="🧠 Brain Report\n\n";
  msg+=`Memory: ${brain.memory}\n`;
  msg+=`Logic: ${brain.logic}\n`;
  msg+=`Focus: ${brain.focus}\n`;

  if(brain.memory>5) msg+="\nGreat memory!";
  if(brain.logic>5) msg+="\nStrong logic!";
  if(brain.focus<0) msg+="\nNeeds focus practice";

  alert(msg);
}

// ---------- FLOW ----------
function loadGame(){
  game.classList.remove("fade");
  void game.offsetWidth;
  game.classList.add("fade");

  let mode=stage%3;

  if(mode===1) memoryGame();
  else if(mode===2) patternGame();
  else sortGame();
}

function nextStage(){
  if(stage<10){
    stage++;
    loadGame();
  } else {
    report();
  }
  updateUI();
}

loadGame();
</script>

</body>
</html>
