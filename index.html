<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Brainy Buddies Game</title>

<style>
body{
  margin:0;
  font-family:sans-serif;
  background:linear-gradient(135deg,#667eea,#764ba2);
  color:white;
  text-align:center;
}

.container{
  max-width:500px;
  margin:auto;
  padding:10px;
}

.card{
  background:white;
  color:#333;
  border-radius:20px;
  padding:15px;
  margin-top:10px;
}

button{
  padding:12px;
  margin:6px;
  border:none;
  border-radius:10px;
  font-size:18px;
  background:#ffd166;
}

.grid{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:8px;
}

.tile{
  background:#eee;
  padding:18px;
  font-size:28px;
  border-radius:12px;
}

.correct{background:#90ee90;}
.wrong{background:#ff7f7f;}

.instructions{
  background:#fff3cd;
  padding:10px;
  border-radius:10px;
  margin-bottom:10px;
}
</style>

</head>

<body>

<div class="container">

<h2>🧠 Brainy Buddies</h2>

<div>
Level <span id="level">1</span>/10 | ⭐ <span id="score">0</span>
</div>

<div class="card" id="game"></div>

<button onclick="nextLevel()">Next ▶</button>

</div>

<script>

let level=1;
let score=0;

const game=document.getElementById("game");

function update(){
  levelEl.innerText=level;
  scoreEl.innerText=score;
}

const levelEl=document.getElementById("level");
const scoreEl=document.getElementById("score");

// ---------- MEMORY ----------
function memoryGame(){
  let emojis=["🐶","🐱","🐸","🐼","🦊"];
  let pairs=2+Math.floor(level/2);
  let deck=[...emojis.slice(0,pairs),...emojis.slice(0,pairs)]
    .sort(()=>Math.random()-0.5);

  let first=null;

  let html=`
  <div class="instructions">
  🧠 Tap two cards to find matching pairs
  </div>
  <div class="grid">
  `;

  deck.forEach(e=>{
    html+=`<div class="tile" onclick="flip(this,'${e}')">❓</div>`;
  });

  html+="</div>";
  game.innerHTML=html;

  window.flip=function(el,val){
    if(el.innerText!=="❓")return;

    el.innerText=val;

    if(!first){
      first={el,val};
    }else{
      if(first.val===val){
        el.classList.add("correct");
        first.el.classList.add("correct");
        score++;
      }else{
        setTimeout(()=>{
          el.innerText="❓";
          first.el.innerText="❓";
        },500);
      }
      first=null;
      update();
    }
  }
}

// ---------- PATTERN ----------
function patternGame(){
  let seq=[];
  for(let i=0;i<3+level;i++){
    seq.push(["🔴","🔵","🟢"][i%3]);
  }

  let ans=seq[seq.length-3];

  let html=`
  <div class="instructions">
  🔷 Find the next pattern
  </div>
  <div style="font-size:30px">
  ${seq.join(" ")} ❓
  </div>
  `;

  ["🔴","🔵","🟢"].forEach(opt=>{
    html+=`<button onclick="answer('${opt}','${ans}')">${opt}</button>`;
  });

  game.innerHTML=html;

  window.answer=function(sel,ans){
    if(sel===ans){
      score+=2;
      showMsg("Correct 🎉");
    }else{
      showMsg("Try again ❌");
    }
    update();
  }
}

// ---------- SORT ----------
function sortGame(){
  let items=["🐶","🍎","🐱","🍌","🐸","🍇"]
    .sort(()=>Math.random()-0.5)
    .slice(0,3+level);

  let html=`
  <div class="instructions">
  🧩 Tap item → then choose category
  </div>
  `;

  items.forEach(i=>{
    html+=`<button onclick="pick('${i}')">${i}</button>`;
  });

  html+=`<br><br>
  <button onclick="drop('animal')">🐾 Animals</button>
  <button onclick="drop('fruit')">🍓 Fruits</button>
  `;

  game.innerHTML=html;

  window.selected=null;

  window.pick=function(i){
    selected=i;
  }

  window.drop=function(type){
    if(!selected)return;

    let animals=["🐶","🐱","🐸"];
    let fruits=["🍎","🍌","🍇"];

    let correct=(type==="animal" && animals.includes(selected)) ||
                (type==="fruit" && fruits.includes(selected));

    if(correct){
      score++;
      showMsg("Good job ⭐");
    }else{
      showMsg("Wrong ❌");
    }

    update();
  }
}

// ---------- MESSAGE ----------
function showMsg(text){
  game.innerHTML += `<p style="color:green;">${text}</p>`;
}

// ---------- FLOW ----------
function loadGame(){
  if(level%3===1) memoryGame();
  else if(level%3===2) patternGame();
  else sortGame();
}

function nextLevel(){
  if(level<10){
    level++;
    loadGame();
  }else{
    game.innerHTML = `
    <h3>🎉 Game Completed!</h3>
    <p>Your Score: ${score}</p>
    <p>Great learning!</p>
    `;
  }
  update();
}

loadGame();

</script>

</body>
</html>
