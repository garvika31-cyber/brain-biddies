<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Brainy Buddies Deluxe</title>

<style>
body{
  margin:0;
  font-family:sans-serif;
  background:linear-gradient(135deg,#ff9a9e,#fad0c4);
  text-align:center;
}

.container{
  max-width:500px;
  margin:auto;
  padding:10px;
}

h1{
  color:white;
}

.card{
  background:white;
  border-radius:20px;
  padding:15px;
  margin-top:10px;
  box-shadow:0 10px 25px rgba(0,0,0,0.2);
  animation:fade 0.5s;
}

button{
  padding:12px;
  margin:6px;
  border:none;
  border-radius:12px;
  font-size:18px;
  background:#ffcc00;
  transition:0.2s;
}

button:active{
  transform:scale(0.9);
}

.grid{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:10px;
}

.tile{
  background:#fff3cd;
  padding:20px;
  font-size:30px;
  border-radius:15px;
  transition:0.3s;
}

.tile:hover{
  transform:scale(1.1);
}

.correct{
  background:#8cffc1;
}

@keyframes fade{
  from{opacity:0;transform:scale(0.9);}
  to{opacity:1;transform:scale(1);}
}

/* confetti */
.confetti{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  pointer-events:none;
}
.dot{
  position:absolute;
  width:8px;
  height:8px;
  background:red;
  animation:fall 1s linear forwards;
}
@keyframes fall{
  to{transform:translateY(100vh);opacity:0;}
}

</style>
</head>

<body>

<div class="container">

<h1>🧠 Brainy Buddies</h1>

<div style="color:white">
Level <span id="level">1</span> | ⭐ <span id="score">0</span>
</div>

<div class="card" id="game"></div>

<button onclick="next()">Next ▶</button>

</div>

<div class="confetti" id="confetti"></div>

<script>

let level=1, score=0;
const game=document.getElementById("game");

function update(){
  levelEl.innerText=level;
  scoreEl.innerText=score;
}

const levelEl=document.getElementById("level");
const scoreEl=document.getElementById("score");

// 🎉 CONFETTI
function confetti(){
  const box=document.getElementById("confetti");
  for(let i=0;i<20;i++){
    let d=document.createElement("div");
    d.className="dot";
    d.style.left=Math.random()*100+"%";
    d.style.background=`hsl(${Math.random()*360},100%,50%)`;
    box.appendChild(d);
    setTimeout(()=>d.remove(),1000);
  }
}

// ---------- MEMORY ----------
function memory(){
  let emojis=["🐶","🐱","🐸","🐼"];
  let deck=[...emojis,...emojis].sort(()=>Math.random()-0.5);
  let first=null;

  let html="<h3>Match Pairs</h3><div class='grid'>";
  deck.forEach(e=>{
    html+=`<div class="tile" onclick="flip(this,'${e}')">❓</div>`;
  });
  html+="</div>";
  game.innerHTML=html;

  window.flip=function(el,val){
    if(el.innerText!=="❓")return;

    el.innerText=val;

    if(!first){
      first={el,val};
    }else{
      if(first.val===val){
        el.classList.add("correct");
        first.el.classList.add("correct");
        score++;
        confetti();
      }else{
        setTimeout(()=>{
          el.innerText="❓";
          first.el.innerText="❓";
        },400);
      }
      first=null;
      update();
    }
  }
}

// ---------- PATTERN ----------
function pattern(){
  let seq=["⭐","🌙","⭐","🌙"];
  let html="<h3>Find Next</h3>";
  html+="<div style='font-size:30px'>"+seq.join(" ")+" ❓</div>";

  ["⭐","🌙","☀️"].forEach(o=>{
    html+=`<button onclick="check('${o}')">${o}</button>`;
  });

  game.innerHTML=html;

  window.check=function(sel){
    if(sel==="⭐"){
      score+=2;
      confetti();
    }
    update();
  }
}

// ---------- FLOW ----------
function load(){
  if(level%2===1) memory();
  else pattern();
}

function next(){
  level++;
  load();
  update();
}

load();

</script>

</body>
</html>
