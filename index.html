<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Brainy Buddies Ultimate</title>

<style>
body{
  margin:0;
  font-family:sans-serif;
  background:linear-gradient(135deg,#4facfe,#00f2fe);
  text-align:center;
  color:#333;
}

.container{
  max-width:500px;
  margin:auto;
  padding:10px;
}

.header{
  color:white;
}

.card{
  background:white;
  border-radius:20px;
  padding:15px;
  margin-top:10px;
  box-shadow:0 8px 20px rgba(0,0,0,0.2);
}

.button{
  padding:12px;
  border:none;
  border-radius:12px;
  margin:6px;
  font-size:18px;
  background:#ffd166;
}

.grid{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:8px;
}

.tile{
  background:#ffe;
  padding:18px;
  font-size:28px;
  border-radius:12px;
}

.correct{background:#90ee90;}
.wrong{background:#ff7f7f;}

.progress{
  color:white;
}

.instructions{
  background:#fff3cd;
  padding:10px;
  border-radius:12px;
  margin-bottom:10px;
}
</style>

</head>

<body>

<div class="container">

<h2 class="header">🧠 Brainy Buddies</h2>

<div class="progress">
Stage <span id="stage">1</span>/10 | ⭐ <span id="score">0</span>
</div>

<div class="card" id="game"></div>

<button class="button" onclick="next()">Next ▶</button>

</div>

<script>

let stage=1;
let score=0;

let brain={
  memory:0,
  logic:0,
  focus:0
};

const game=document.getElementById("game");

function update(){
  stageEl.innerText=stage;
  scoreEl.innerText=score;
}

const stageEl=document.getElementById("stage");
const scoreEl=document.getElementById("score");

// ---------- MEMORY ----------
function memory(){
  let emojis=["🐶","🐱","🐸","🐼"];
  let deck=[...emojis,...emojis].sort(()=>Math.random()-0.5);

  let first=null;

  let html=`
  <div class="instructions">
  🧠 Match same animals. Tap two cards.
  </div>
  <div class="grid">
  `;

  deck.forEach(e=>{
    html+=`<div class="tile" onclick="flip(this,'${e}')">❓</div>`;
  });

  html+="</div>";
  game.innerHTML=html;

  window.flip=function(el,val){
    if(el.innerText!=="❓")return;

    el.innerText=val;

    if(!first){
      first={el,val};
    }else{
      if(first.val===val){
        el.classList.add("correct");
        first.el.classList.add("correct");
        score++;
        brain.memory++;
      }else{
        setTimeout(()=>{
          el.innerText="❓";
          first.el.innerText="❓";
        },500);
      }
      first=null;
      update();
    }
  }
}

// ---------- PATTERN ----------
function pattern(){
  let seq=["🐶","🐱","🐶","🐱"];

  let html=`
  <div class="instructions">
  🔷 Find what comes next
  </div>
  <div style="font-size:30px">
  ${seq.join(" ")} ❓
  </div>
  `;

  ["🐶","🐱","🐸"].forEach(opt=>{
    html+=`<button class="button" onclick="answer('${opt}')">${opt}</button>`;
  });

  game.innerHTML=html;

  window.answer=function(a){
    if(a==="🐶"){
      score+=2;
      brain.logic++;
      alert("Correct!");
    }else{
      alert("Try again!");
    }
    update();
  }
}

// ---------- SORT ----------
function sort(){
  let html=`
  <div class="instructions">
  🧩 Tap item then choose category
  </div>
  <button onclick="pick('🐶')">🐶</button>
  <button onclick="pick('🍎')">🍎</button>
  <br><br>
  <button onclick="drop('animal')">🐾</button>
  <button onclick="drop('fruit')">🍓</button>
  `;

  game.innerHTML=html;

  window.selected=null;

  window.pick=function(i){
    selected=i;
  }

  window.drop=function(type){
    if(!selected)return;

    let correct=(selected==="🐶" && type==="animal") ||
                (selected==="🍎" && type==="fruit");

    if(correct){
      score++;
      brain.logic++;
      alert("Good!");
    }else{
      alert("Wrong!");
    }

    update();
  }
}

// ---------- FLOW ----------
function load(){
  if(stage%3===1) memory();
  else if(stage%3===2) pattern();
  else sort();
}

function next(){
  if(stage<10){
    stage++;
    load();
  }else{
    report();
  }
  update();
}

function report(){
  alert(
    "🧠 Report\n"+
    "Memory: "+brain.memory+"\n"+
    "Logic: "+brain.logic+"\n"+
    "Focus: "+brain.focus
  );
}

load();

</script>

</body>
</html>
