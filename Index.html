<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Brainy Buddies · Ages 4‑6</title>
  <style>
    * {
      box-sizing: border-box;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }
    body {
      margin: 0;
      min-height: 100vh;
      background: linear-gradient(145deg, #2b5a8c 0%, #1b3f5c 100%);
      font-family: 'Segoe UI', 'Roboto', system-ui, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 12px;
    }
    .game-container {
      max-width: 750px;
      width: 100%;
      background: rgba(255, 255, 255, 0.92);
      backdrop-filter: blur(8px);
      border-radius: 64px 64px 48px 48px;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.25), 0 6px 12px rgba(0, 0, 0, 0.3);
      padding: 24px 20px 30px;
      border: 3px solid #ffd966;
      text-align: center;
    }
    h1 {
      margin: 0 0 8px;
      font-size: 2.2rem;
      font-weight: 700;
      color: #1e2f4b;
      text-shadow: 3px 3px 0 #ffb347;
      letter-spacing: -0.5px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      flex-wrap: wrap;
    }
    .stars-container {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin: 5px 0 15px;
    }
    .star-badge {
      background: #f9e75c;
      padding: 8px 20px;
      border-radius: 40px;
      font-size: 1.8rem;
      font-weight: bold;
      color: #2d3e50;
      box-shadow: inset 0 -3px 0 #c49b1f, 0 6px 0 #7f5f1a;
      border: 2px solid #fef9d7;
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }
    .game-board {
      background: #e7f0fd;
      border-radius: 56px;
      padding: 24px 16px 20px;
      margin: 10px 0 5px;
      border: 4px solid white;
      box-shadow: inset 0 2px 8px rgba(0,0,0,0.05), 0 12px 0 #4a6a8b;
    }
    .mode-selector {
      display: flex;
      justify-content: space-around;
      gap: 8px;
      margin-bottom: 28px;
    }
    .mode-btn {
      background: #f4c27a;
      border: none;
      border-radius: 60px;
      padding: 12px 8px;
      font-size: 1.1rem;
      font-weight: bold;
      color: #1e3a5f;
      box-shadow: 0 5px 0 #b46f30, 0 2px 8px rgba(0,0,0,0.2);
      border: 2px solid #fff1d0;
      cursor: pointer;
      transition: all 0.05s ease-in;
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 5px;
    }
    .mode-btn.active {
      background: #ffdb7c;
      box-shadow: 0 2px 0 #b46f30, 0 4px 10px #ffd966;
      transform: translateY(3px);
      border-color: #ffffff;
    }
    .mode-btn span {
      font-size: 1.8rem;
    }
    .play-area {
      min-height: 280px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    /* Memory Grid */
    .memory-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
      justify-content: center;
      margin: 10px 0;
    }
    .card {
      aspect-ratio: 1 / 1;
      background: #ffcf8a;
      border-radius: 24px;
      box-shadow: 0 8px 0 #9f6e42, 0 4px 8px rgba(0,0,0,0.2);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2.8rem;
      cursor: pointer;
      border: 3px solid #fef6e3;
      transition: 0.1s;
      transform: translateY(-2px);
    }
    .card.flipped {
      background: #b0d9b1;
      box-shadow: 0 4px 0 #5d7a5e;
      transform: translateY(4px);
      border-color: #e2f0e2;
    }
    .card.matched {
      background: #a3c9a8;
      box-shadow: 0 2px 0 #3f6842;
      transform: translateY(6px);
      opacity: 0.7;
      pointer-events: none;
      font-size: 2.5rem;
    }
    /* Pattern */
    .pattern-row {
      display: flex;
      justify-content: center;
      gap: 18px;
      flex-wrap: wrap;
      margin: 25px 0 15px;
    }
    .pattern-item {
      width: 80px;
      height: 80px;
      background: #ffecb3;
      border-radius: 30px;
      box-shadow: 0 7px 0 #c2a155;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 3rem;
      border: 3px solid #fff5d6;
    }
    .options-row {
      display: flex;
      justify-content: center;
      gap: 25px;
      margin-top: 20px;
    }
    .option-btn {
      width: 90px;
      height: 90px;
      background: #fdd998;
      border-radius: 35px;
      box-shadow: 0 8px 0 #b77e3c;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 3.2rem;
      cursor: pointer;
      border: 3px solid #fff6e0;
      transition: 0.08s;
      transform: translateY(-2px);
    }
    .option-btn:active {
      box-shadow: 0 2px 0 #b77e3c;
      transform: translateY(6px);
    }
    /* Sort (Tap version) */
    .sort-instruction {
      font-size: 1.4rem;
      margin-bottom: 10px;
      font-weight: bold;
      color: #1e3a5f;
    }
    .sort-boxes {
      display: flex;
      gap: 20px;
      justify-content: center;
      margin: 20px 0 10px;
    }
    .drop-zone {
      width: 140px;
      min-height: 130px;
      background: #cbe4f0;
      border-radius: 40px;
      box-shadow: inset 0 4px 6px rgba(0,0,0,0.05), 0 8px 0 #6e8b9c;
      border: 4px dashed #ffffff;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 15px 5px;
      transition: 0.1s;
    }
    .drop-zone span {
      font-size: 2.5rem;
      margin-bottom: 5px;
    }
    .drop-zone.selected-zone {
      background: #ffe599;
      border: 4px solid #ffb347;
      box-shadow: inset 0 4px 6px rgba(0,0,0,0.05), 0 4px 0 #6e8b9c;
      transform: translateY(4px);
    }
    .items-to-sort {
      display: flex;
      justify-content: center;
      gap: 25px;
      margin: 20px 0 10px;
      flex-wrap: wrap;
    }
    .sort-item {
      width: 85px;
      height: 85px;
      background: #fbd5a2;
      border-radius: 30px;
      box-shadow: 0 7px 0 #b47d44;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 3rem;
      border: 3px solid white;
      cursor: pointer;
      transition: 0.08s;
      transform: translateY(-2px);
    }
    .sort-item.selected-item {
      background: #ffe082;
      box-shadow: 0 3px 0 #b47d44;
      transform: translateY(4px);
      border: 4px solid #ffc107;
    }
    .sort-item.placed {
      opacity: 0;
      pointer-events: none;
    }
    .message-area {
      min-height: 50px;
      font-size: 1.6rem;
      font-weight: bold;
      color: #1f4a2c;
      margin: 15px 0 5px;
      padding: 8px;
      background: #fef8e7;
      border-radius: 40px;
    }
    .action-button {
      background: #5fa7cf;
      border: none;
      color: white;
      font-weight: bold;
      font-size: 1.5rem;
      padding: 16px 35px;
      border-radius: 50px;
      box-shadow: 0 7px 0 #2c5a7a;
      border: 2px solid #b5dafc;
      cursor: pointer;
      margin-top: 20px;
      transition: 0.08s;
      transform: translateY(-3px);
    }
    .action-button:active {
      box-shadow: 0 2px 0 #2c5a7a;
      transform: translateY(4px);
    }
    .footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 15px;
      color: #1e3f5e;
      font-weight: 600;
    }
  </style>
</head>
<body>
<div class="game-container">
  <h1>
    <span>🧸 Brainy Buddies</span>
  </h1>
  <div class="stars-container">
    <div class="star-badge" id="starDisplay">⭐ 0</div>
  </div>
  <div class="game-board">
    <div class="mode-selector">
      <button class="mode-btn active" data-mode="memory"><span>🃏</span> Memory</button>
      <button class="mode-btn" data-mode="pattern"><span>🔷</span> Pattern</button>
      <button class="mode-btn" data-mode="sort"><span>🧩</span> Sort</button>
    </div>
    <div id="playArea" class="play-area"></div>
    <div id="message" class="message-area">✨ Choose a game! ✨</div>
    <button class="action-button" id="nextRoundBtn">▶ Next Round</button>
  </div>
  <div class="footer">
    <span>👧 4‑6 years</span>
    <span>🧠 science‑backed</span>
    <span>🌟 fun learning</span>
  </div>
</div>

<script>
  (function(){
    "use strict";

    // ---------- GLOBAL STATE ----------
    let currentMode = 'memory';
    let starsEarned = 0;
    const starDisplay = document.getElementById('starDisplay');
    const playArea = document.getElementById('playArea');
    const messageDiv = document.getElementById('message');
    const nextBtn = document.getElementById('nextRoundBtn');

    // Game states
    let memoryCards = [], memoryFlipped = [], memoryLock = false, memoryMatchedPairs = 0;
    let patternSequence = [], patternOptions = [], patternCorrectAnswer = '', patternAnswered = false;
    let sortItems = [], sortRemaining = [], sortSelectedItem = null, sortSelectedZone = null, sortCompleted = false;

    // Helpers
    function addStars(amount = 1) {
      starsEarned += amount;
      starDisplay.innerText = `⭐ ${starsEarned}`;
    }
    function setMessage(text, isGood = true) {
      messageDiv.innerHTML = text;
      messageDiv.style.color = isGood ? '#1f4a2c' : '#9e3c3c';
    }
    function shuffleArray(arr) {
      for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
    }

    // Mode switching
    document.querySelectorAll('.mode-btn').forEach(btn => {
      btn.addEventListener('click', (e) => {
        document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        currentMode = btn.dataset.mode;
        resetForMode();
        renderGame();
      });
    });

    function resetForMode() {
      memoryCards = []; memoryFlipped = []; memoryLock = false; memoryMatchedPairs = 0;
      patternAnswered = false;
      sortCompleted = false; sortSelectedItem = null; sortSelectedZone = null;
    }

    function renderGame() {
      if (currentMode === 'memory') renderMemory();
      else if (currentMode === 'pattern') renderPattern();
      else if (currentMode === 'sort') renderSort();
    }

    // ---------- MEMORY MATCH ----------
    function renderMemory() {
      const emojiSet = ['🐶', '🐱', '🐸', '🐼'];
      let deck = [...emojiSet, ...emojiSet];
      shuffleArray(deck);
      memoryCards = deck.map((value, index) => ({
        id: index, value, matched: false, flipped: false
      }));
      memoryMatchedPairs = 0; memoryFlipped = []; memoryLock = false;

      let html = `<div class="memory-grid">`;
      memoryCards.forEach((card, idx) => {
        const display = (card.flipped || card.matched) ? card.value : '❓';
        const classes = `card ${card.flipped ? 'flipped' : ''} ${card.matched ? 'matched' : ''}`;
        html += `<div class="${classes}" data-card-id="${idx}">${display}</div>`;
      });
      html += `</div>`;
      playArea.innerHTML = html;
      setMessage('🐾 Find the matching pairs!', true);

      document.querySelectorAll('.card').forEach(cardEl => {
        cardEl.addEventListener('click', onMemoryCardClick);
      });
    }

    function onMemoryCardClick(e) {
      if (memoryLock) return;
      const cardDiv = e.currentTarget;
      const cardId = parseInt(cardDiv.dataset.cardId);
      const card = memoryCards[cardId];
      if (card.matched) return;
      if (memoryFlipped.includes(cardId)) return;
      if (memoryFlipped.length >= 2) return;

      card.flipped = true;
      memoryFlipped.push(cardId);
      updateMemoryCardUI(cardId);

      if (memoryFlipped.length === 2) {
        memoryLock = true;
        const [id1, id2] = memoryFlipped;
        const card1 = memoryCards[id1], card2 = memoryCards[id2];

        if (card1.value === card2.value) {
          card1.matched = true; card2.matched = true;
          memoryMatchedPairs++;
          addStars(1);
          setMessage('🌟 Great match! +1 star', true);
          updateMemoryCardUI(id1); updateMemoryCardUI(id2);
          memoryFlipped = []; memoryLock = false;
          if (memoryMatchedPairs === 4) {
            setMessage('🎉 You found all pairs! Super memory! 🌟🌟🌟', true);
            addStars(2);
          }
        } else {
          setMessage('🙈 Not a match, try again!', false);
          setTimeout(() => {
            card1.flipped = false; card2.flipped = false;
            updateMemoryCardUI(id1); updateMemoryCardUI(id2);
            memoryFlipped = []; memoryLock = false;
          }, 700);
        }
      }
    }

    function updateMemoryCardUI(cardId) {
      const cardEl = document.querySelector(`.card[data-card-id="${cardId}"]`);
      if (!cardEl) return;
      const card = memoryCards[cardId];
      cardEl.textContent = (card.flipped || card.matched) ? card.value : '❓';
      cardEl.className = `card ${card.flipped ? 'flipped' : ''} ${card.matched ? 'matched' : ''}`;
    }

    // ---------- PATTERN ----------
    function renderPattern() {
      patternAnswered = false;
      const patterns = [
        { seq: ['🐶', '🐱', '🐶', '🐱'], options: ['🐶', '🐱', '🐸'], answer: '🐶' },
        { seq: ['🔴', '🔵', '🔴', '🔵'], options: ['🔴', '🟡', '🔵'], answer: '🔴' },
        { seq: ['🍎', '🍌', '🍎', '🍌'], options: ['🍎', '🍇', '🍌'], answer: '🍎' },
        { seq: ['⭐', '🌙', '⭐', '🌙'], options: ['⭐', '☀️', '🌙'], answer: '⭐' }
      ];
      const chosen = patterns[Math.floor(Math.random() * patterns.length)];
      patternSequence = chosen.seq; patternOptions = chosen.options; patternCorrectAnswer = chosen.answer;
      shuffleArray(patternOptions);

      let seqHtml = `<div class="pattern-row">`;
      patternSequence.forEach(emoji => seqHtml += `<div class="pattern-item">${emoji}</div>`);
      seqHtml += `<div class="pattern-item" style="background:#ffe0b0;">❓</div></div>`;
      let optHtml = `<div class="options-row">`;
      patternOptions.forEach(opt => optHtml += `<div class="option-btn" data-option="${opt}">${opt}</div>`);
      optHtml += `</div>`;
      playArea.innerHTML = seqHtml + optHtml;
      setMessage('🔍 Which one comes next? Tap the answer!', true);

      document.querySelectorAll('.option-btn').forEach(btn => {
        btn.addEventListener('click', onPatternOptionClick);
      });
    }

    function onPatternOptionClick(e) {
      if (patternAnswered) return;
      const selected = e.currentTarget.dataset.option;
      patternAnswered = true;
      if (selected === patternCorrectAnswer) {
        setMessage(`✅ Yes! ${selected} is correct! +2 stars!`, true);
        addStars(2);
        e.currentTarget.style.background = '#b0e57c';
      } else {
        setMessage(`❌ Oops! The pattern needed ${patternCorrectAnswer}. Try next one.`, false);
        e.currentTarget.style.background = '#f4a2a2';
      }
      document.querySelectorAll('.option-btn').forEach(btn => btn.style.pointerEvents = 'none');
    }

    // ---------- SORT (TAP TO SORT) ----------
    function renderSort() {
      sortCompleted = false; sortSelectedItem = null; sortSelectedZone = null;
      const allItems = ['🐶', '🍎', '🐱', '🍌', '🐸', '🍇', '🐼', '🍊'];
      shuffleArray(allItems);
      sortItems = allItems.slice(0, 5); // 5 items to sort
      sortRemaining = [...sortItems];

      let html = `
        <div class="sort-instruction">👉 Tap an item, then tap the correct box</div>
        <div class="sort-boxes">
          <div class="drop-zone" data-category="animals"><span>🐾</span> Animals</div>
          <div class="drop-zone" data-category="fruits"><span>🍓</span> Fruits</div>
        </div>
        <div class="items-to-sort" id="sortItemsContainer">
      `;
      sortItems.forEach((item, idx) => {
        html += `<div class="sort-item" data-item="${item}" data-idx="${idx}">${item}</div>`;
      });
      html += `</div>`;
      playArea.innerHTML = html;
      setMessage('Tap an item, then tap the box where it belongs!', true);

      // Attach listeners
      document.querySelectorAll('.sort-item').forEach(el => {
        el.addEventListener('click', onSortItemClick);
      });
      document.querySelectorAll('.drop-zone').forEach(el => {
        el.addEventListener('click', onDropZoneClick);
      });
    }

    function onSortItemClick(e) {
      if (sortCompleted) return;
      const itemEl = e.currentTarget;
      if (itemEl.classList.contains('placed')) return;

      // Remove previous selection highlight
      document.querySelectorAll('.sort-item').forEach(el => el.classList.remove('selected-item'));
      itemEl.classList.add('selected-item');
      sortSelectedItem = {
        element: itemEl,
        item: itemEl.dataset.item,
        idx: itemEl.dataset.idx
      };
      setMessage(`Selected ${itemEl.dataset.item}. Now tap the correct box.`, true);
    }

    function onDropZoneClick(e) {
      if (sortCompleted) return;
      if (!sortSelectedItem) {
        setMessage('👆 First tap an item!', false);
        return;
      }
      const zone = e.currentTarget;
      const category = zone.dataset.category;
      const itemEmoji = sortSelectedItem.item;
      const itemEl = sortSelectedItem.element;

      const animalEmojis = ['🐶','🐱','🐸','🐼'];
      const fruitEmojis = ['🍎','🍌','🍇','🍊'];

      let isCorrect = false;
      if (category === 'animals' && animalEmojis.includes(itemEmoji)) isCorrect = true;
      if (category === 'fruits' && fruitEmojis.includes(itemEmoji)) isCorrect = true;

      if (isCorrect) {
        setMessage(`✅ Great! ${itemEmoji} belongs to ${category}! +1 star`, true);
        addStars(1);
        itemEl.classList.add('placed');
        itemEl.classList.remove('selected-item');
        // Remove from remaining
        sortRemaining = sortRemaining.filter(i => i !== itemEmoji);
        sortSelectedItem = null;

        if (sortRemaining.length === 0) {
          sortCompleted = true;
          setMessage('🎈 Amazing! You sorted everything! +3 bonus stars!', true);
          addStars(3);
        } else {
          setMessage(`👍 Good! ${sortRemaining.length} more to sort.`, true);
        }
      } else {
        setMessage(`❌ Hmm, ${itemEmoji} doesn't go there. Try again!`, false);
        itemEl.classList.remove('selected-item');
        sortSelectedItem = null;
      }
    }

    // Next round
    nextBtn.addEventListener('click', () => {
      resetForMode();
      renderGame();
    });

    // Init
    renderGame();
  })();
</script>
</body>
</html>
